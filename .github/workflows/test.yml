name: Test

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]
  workflow_dispatch:

jobs:
  check-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate README costs table matches seed.ts
        run: bash scripts/check-readme-costs.sh

  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run test:unit

  test-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci

      - name: Create Neon branch for tests
        id: neon
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: ci-${{ github.event_name }}-${{ github.run_id }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Set database URL
        run: echo "DB_URL=${{ steps.neon.outputs.db_url_pooled }}" >> "$GITHUB_ENV"

      - name: Push schema
        run: npx drizzle-kit push --force
        env:
          COSTS_SERVICE_DATABASE_URL: ${{ env.DB_URL }}

      - name: Run integration tests
        run: npm run test:integration
        env:
          COSTS_SERVICE_DATABASE_URL: ${{ env.DB_URL }}
          COSTS_SERVICE_API_KEY: test-api-key

      - name: Cleanup Neon branch
        if: always()
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: ci-${{ github.event_name }}-${{ github.run_id }}
          api_key: ${{ secrets.NEON_API_KEY }}
